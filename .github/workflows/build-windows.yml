name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  build-windows:
    name: Build WhisperTray for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (CPU-only for GitHub runners)
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper sounddevice pynput pystray Pillow pyperclip requests python-dotenv pyinstaller pyinstaller-hooks-contrib
          # Note: GitHub runners have no GPU, so this build will use CPU mode
          # For GPU builds, run build.bat on a Windows machine with CUDA installed

      - name: Verify ONNX file exists
        run: |
          python -c "import faster_whisper, os; fw=os.path.dirname(faster_whisper.__file__); onnx=os.path.join(fw,'assets','silero_vad_v6.onnx'); print(f'ONNX path: {onnx}'); assert os.path.exists(onnx), 'ONNX file not found!'; print('OK: ONNX file found')"

      - name: Build with PyInstaller
        run: |
          cd whisper_tray
          # Force CPU mode for GitHub Actions runners (no GPU available)
          set DEVICE=cpu
          set COMPUTE_TYPE=int8
          pyinstaller --clean --noconfirm whisper_tray.spec
        shell: cmd

      - name: Verify build output
        run: |
          if (-not (Test-Path "dist\WhisperTray\WhisperTray.exe")) {
            Write-Error "WhisperTray.exe not found!"
            exit 1
          }
          Write-Host "OK: WhisperTray.exe created successfully"
          Get-ChildItem "dist\WhisperTray" -Recurse | Select-Object FullName, Length

      - name: Copy ONNX files explicitly (safety check)
        run: |
          $fw = python -c "import faster_whisper, os; print(os.path.dirname(faster_whisper.__file__))"
          $dest = "dist\WhisperTray\_internal\faster_whisper\assets"
          if (-not (Test-Path $dest)) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
          }
          Copy-Item "$fw\assets\*.onnx" $dest -Force
          Write-Host "OK: ONNX files copied to $dest"
          Get-ChildItem $dest

      - name: Create release archive
        run: |
          Compress-Archive -Path "dist\WhisperTray\*" -DestinationPath "WhisperTray-Windows.zip" -Force
          Write-Host "OK: Archive created: WhisperTray-Windows.zip"
          $size = (Get-Item "WhisperTray-Windows.zip").Length / 1MB
          Write-Host "  Size: $([math]::Round($size, 2)) MB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTray-Windows
          path: WhisperTray-Windows.zip
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WhisperTray-Windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Debug Version (with console)
        run: |
          cd whisper_tray
          pyinstaller --clean --noconfirm --name WhisperTray_DEBUG --console --onedir whisper_tray.spec
        shell: cmd

      - name: Copy ONNX files for Debug build
        run: |
          $fw = python -c "import faster_whisper, os; print(os.path.dirname(faster_whisper.__file__))"
          $dest = "dist\WhisperTray_DEBUG\_internal\faster_whisper\assets"
          if (-not (Test-Path $dest)) {
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
          }
          Copy-Item "$fw\assets\*.onnx" $dest -Force
          Write-Host "OK: ONNX files copied to Debug build"

      - name: Create Debug archive
        run: |
          Compress-Archive -Path "dist\WhisperTray_DEBUG\*" -DestinationPath "WhisperTray-Windows-DEBUG.zip" -Force
          Write-Host "OK: Debug archive created"

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTray-Windows-DEBUG
          path: WhisperTray-Windows-DEBUG.zip
          retention-days: 30
